name: Build Windows executable

on:
  push:
    tags:
      - "v*"          # build + attach an .exe on every version tag (e.g. v0.1.0)
  workflow_dispatch:   # ...or trigger manually from the Actions tab

permissions:
  contents: write       # needed to upload release assets

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build single-file executable
        run: pyinstaller --noconfirm --onefile --windowed --name ReCompLauncher recomplauncher.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReCompLauncher-windows
          path: dist/ReCompLauncher.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ReCompLauncher.exe
